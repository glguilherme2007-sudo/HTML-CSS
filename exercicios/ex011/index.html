<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midias em html5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>tente abrir esse site em varios dispositivos diferentes nou simplesmente aumente e diminua o tamanho do seu navegador</p>
    <picture>
      <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
     <source media="(max-width: 1050px)" srcset="imagens/foto-M.png" type="image/png">
    <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>reproduzindo audio</h1>
    <p>vamos aprender a reproduzir audio em HTML5</p>
   <audio preload="metadata" autoplay controls>
    <source src="midia/Ghibli Station - The Mini Vandals.mp3" type="audio/mpeg">
    <source src="midia/guanacast-33.mp3" type="audio/ogg">
    <p>infelizmente seu navegador nao consegue reproduzir audio <a href="midia/Ghibli Station - The Mini Vandals.mp3">Clique aqui para baixar o arquivo</a> </p>
   </audio>

</body>
</html>
